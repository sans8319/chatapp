server:
  port: 8080

spring:
  application:
    name: chat-service
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/chatapp
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  # Hibernate/JPA Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG